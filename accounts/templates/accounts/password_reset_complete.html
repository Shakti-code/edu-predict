{% extends 'predictor/base.html' %}
{% load static %}

{% block title %}Password Reset Complete - EduPredict{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon-wrapper" style="color: var(--success); background: rgba(16, 185, 129, 0.1);">
                <i data-lucide="check-circle-2"></i>
            </div>
            <h1>Password Reset Complete</h1>
            <p>Your password has been successfully reset. You can now use your new password to sign in.</p>
        </div>

        <a href="{% url 'login' %}" class="btn-primary auth-btn" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">
            <span>Sign In Now</span>
            <i data-lucide="log-in"></i>
        </a>
    </div>
</div>
{% endblock %}
